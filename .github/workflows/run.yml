name: 墨水屏自动推送

on:
  schedule:
    - cron: '0 * * * *'  # 意思是：每隔 1小时自动运行一次
  workflow_dispatch:       # 意思是：允许你手动点击按钮运行（方便测试）

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新的 Linux 云端电脑
    
    steps:
      - name: 获取代码
        uses: actions/checkout@v3
        
      - name: 安装 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 安装画图和网络请求工具包
        run: pip install requests pillow
          
      - name: 运行！生成图片并推送
        run: python main.py
